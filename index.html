<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Barril & Orden</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Crimson+Pro:ital@1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0d0a;
    --surface: #1a1714;
    --surface2: #242018;
    --border: #3a3228;
    --amber: #e8a020;
    --amber-dim: #a06a10;
    --amber-glow: rgba(232,160,32,0.12);
    --cream: #f0e8d0;
    --muted: #7a6e5e;
    --green: #4a8c5c;
    --red: #c04030;
    --red-dim: rgba(192,64,48,0.15);
    --text: #e8dfc8;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --nav-h: 64px;
    --header-h: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overscroll-behavior: none;
  }

  /* ── APP SHELL ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ── HEADER ── */
  .app-header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1rem;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: var(--amber);
    letter-spacing: 0.06em;
  }

  .logo sub {
    font-size: 0.55rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    display: block;
    letter-spacing: 0.15em;
    margin-top: -4px;
  }

  #clock {
    font-size: 0.75rem;
    color: var(--amber);
    letter-spacing: 0.05em;
  }

  /* ── SCREENS ── */
  .screens {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .screen {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    display: none;
    padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 8px);
  }

  .screen.active { display: block; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    height: calc(var(--nav-h) + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.15s;
    padding: 0;
    position: relative;
  }

  .nav-btn.active { color: var(--amber); }

  .nav-btn .nav-icon {
    font-size: 1.3rem;
    line-height: 1;
  }

  .nav-badge {
    position: absolute;
    top: 6px;
    right: calc(50% - 18px);
    background: var(--red);
    color: white;
    font-size: 0.55rem;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
  }

  .nav-badge.hidden { display: none; }

  /* ══════════════════════════════
     SCREEN 1 — MESAS
  ══════════════════════════════ */
  .mesas-screen { padding: 1rem; }

  .screen-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .mesas-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.75rem;
  }

  .mesa-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    active-scale: 0.97;
  }

  .mesa-card:active { transform: scale(0.97); }

  .mesa-card.ocupada { border-color: var(--amber-dim); }

  .mesa-card.cuenta {
    border-color: var(--red);
    background: rgba(192,64,48,0.06);
  }

  .mesa-card.selected {
    border-color: var(--amber);
    background: var(--amber-glow);
    box-shadow: 0 0 16px var(--amber-glow);
  }

  .mesa-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .mesa-num-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    color: var(--amber);
    line-height: 1;
  }

  .mesa-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-top: 4px;
    flex-shrink: 0;
  }

  .mesa-dot.libre { background: var(--muted); }
  .mesa-dot.ocupada { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .mesa-dot.cuenta { background: var(--red); box-shadow: 0 0 6px var(--red); }

  .mesa-estado {
    font-size: 0.58rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 4px;
  }

  .mesa-card.ocupada .mesa-estado { color: var(--amber-dim); }
  .mesa-card.cuenta .mesa-estado { color: var(--red); }

  .mesa-total-card {
    font-size: 0.8rem;
    color: var(--cream);
    margin-top: 6px;
    font-weight: 500;
  }

  .mesa-hora {
    font-size: 0.58rem;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Resumen */
  .resumen-strip {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .resumen-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.5rem;
    text-align: center;
  }

  .resumen-chip-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--amber);
    line-height: 1;
  }

  .resumen-chip-label {
    font-size: 0.55rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  /* ══════════════════════════════
     SCREEN 2 — ORDEN
  ══════════════════════════════ */
  .orden-screen {}

  .orden-no-mesa {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    color: var(--muted);
    gap: 0.8rem;
    font-size: 0.75rem;
  }

  .orden-no-mesa .icon { font-size: 3rem; opacity: 0.3; }

  /* Sub-tabs dentro de orden */
  .sub-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 5;
  }

  .sub-tab {
    flex: 1;
    padding: 0.75rem 0.5rem;
    text-align: center;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    background: transparent;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'DM Mono', monospace;
  }

  .sub-tab.active {
    color: var(--amber);
    border-bottom-color: var(--amber);
  }

  .sub-panel { display: none; }
  .sub-panel.active { display: block; }

  /* Mesa selector banner */
  .mesa-banner {
    background: var(--surface);
    padding: 0.8rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .mesa-banner-left { display: flex; align-items: center; gap: 0.6rem; }

  .mesa-banner-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--amber);
    line-height: 1;
  }

  .mesa-banner-info { font-size: 0.62rem; color: var(--muted); line-height: 1.5; }
  .mesa-banner-info b { color: var(--cream); }

  .btn-sm {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    padding: 0.4rem 0.8rem;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: all 0.15s;
    border: 1px solid;
  }

  .btn-sm-cuenta { color: var(--amber); border-color: var(--amber-dim); background: transparent; }
  .btn-sm-cuenta:active { background: var(--amber-glow); }

  /* Pedido lista */
  .pedido-lista { padding: 0 1rem; }

  .pedido-empty {
    text-align: center;
    color: var(--muted);
    font-size: 0.72rem;
    padding: 3rem 1rem;
    line-height: 2;
  }

  .pedido-item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 0.6rem;
    padding: 0.9rem 0;
    border-bottom: 1px solid var(--border);
  }

  .item-name { font-size: 0.78rem; color: var(--cream); }
  .item-cat { font-size: 0.58rem; color: var(--muted); margin-top: 2px; }

  .qty-ctrl { display: flex; align-items: center; gap: 0.35rem; }

  .qty-btn {
    width: 28px;
    height: 28px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    border-radius: 4px;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
    flex-shrink: 0;
  }

  .qty-btn:active { border-color: var(--amber); color: var(--amber); transform: scale(0.92); }

  .qty-num {
    font-size: 0.9rem;
    color: var(--amber);
    min-width: 22px;
    text-align: center;
    font-weight: 500;
  }

  .item-price { font-size: 0.78rem; color: var(--cream); text-align: right; min-width: 60px; }

  /* Totales */
  .totales-box {
    margin: 0.8rem 1rem 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .totales-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
  }

  .totales-row:last-child { border-bottom: none; }

  .totales-row.grand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    color: var(--amber);
    padding: 0.8rem 1rem;
  }

  .btn-cuenta-full {
    margin: 0.8rem 1rem 0;
    width: calc(100% - 2rem);
    padding: 1rem;
    background: var(--amber);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-cuenta-full:active { opacity: 0.8; transform: scale(0.99); }

  /* Menú panel */
  .menu-panel { padding: 0 1rem; }

  .cat-scroll {
    display: flex;
    gap: 0.4rem;
    overflow-x: auto;
    padding: 0.8rem 0;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }

  .cat-scroll::-webkit-scrollbar { display: none; }

  .cat-pill {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    padding: 0.35rem 0.8rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
    transition: all 0.12s;
    flex-shrink: 0;
  }

  .cat-pill.active, .cat-pill:active {
    border-color: var(--amber);
    color: var(--amber);
    background: var(--amber-glow);
  }

  .menu-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.9rem 0.8rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.12s;
    border: 1px solid transparent;
    margin-bottom: 0.3rem;
    active-scale: 0.98;
  }

  .menu-item:active {
    background: var(--surface2);
    border-color: var(--amber-dim);
    transform: scale(0.98);
  }

  .menu-item.flash {
    background: var(--amber-glow);
    border-color: var(--amber-dim);
  }

  .menu-item-name { font-size: 0.78rem; color: var(--cream); }

  .menu-item-desc {
    font-size: 0.62rem;
    color: var(--muted);
    margin-top: 2px;
    font-family: 'Crimson Pro', serif;
    font-style: italic;
  }

  .menu-item-right { display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0; }

  .menu-item-price {
    font-size: 0.78rem;
    color: var(--amber);
    white-space: nowrap;
  }

  .add-btn {
    width: 28px;
    height: 28px;
    background: var(--amber);
    color: var(--bg);
    border: none;
    border-radius: 50%;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.1s;
  }

  .add-btn:active { transform: scale(0.88); }

  /* ══════════════════════════════
     SCREEN 3 — RESUMEN
  ══════════════════════════════ */
  .resumen-screen { padding: 1rem; }

  .turno-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    margin-bottom: 1rem;
  }

  .turno-card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 0.8rem;
  }

  .turno-stat {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  .turno-stat:last-child { border-bottom: none; }
  .turno-stat span:last-child { color: var(--amber); }

  .mesas-list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    margin-bottom: 0.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: all 0.12s;
  }

  .mesas-list-item:active { border-color: var(--amber-dim); }

  .mesas-list-item.cuenta-pend { border-color: var(--red); }

  .mli-left { display: flex; align-items: center; gap: 0.8rem; }

  .mli-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--amber);
    line-height: 1;
    min-width: 32px;
  }

  .mli-info { font-size: 0.65rem; color: var(--muted); line-height: 1.6; }
  .mli-info b { color: var(--cream); }

  .mli-total { font-size: 0.9rem; color: var(--cream); font-weight: 500; }

  /* ══════════════════════════════
     MODAL CUENTA
  ══════════════════════════════ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,8,6,0.9);
    display: flex;
    align-items: flex-end;
    z-index: 200;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.hidden { display: none; }

  .modal-sheet {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 1.5rem 1.2rem;
    padding-bottom: calc(1.5rem + var(--safe-bottom));
    width: 100%;
    max-height: 85dvh;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 1.2rem;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--amber);
    margin-bottom: 1rem;
    letter-spacing: 0.05em;
  }

  .modal-item-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  .modal-item-row .qty { color: var(--muted); margin-right: 0.4rem; }

  .modal-total-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    color: var(--amber);
    text-align: right;
    margin: 1rem 0 0.3rem;
  }

  .modal-total-big span {
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    vertical-align: middle;
    margin-right: 0.3rem;
  }

  .modal-iva { font-size: 0.62rem; color: var(--muted); text-align: right; margin-bottom: 1rem; }

  .modal-btns { display: flex; flex-direction: column; gap: 0.6rem; }

  .btn-pagar {
    width: 100%;
    padding: 1rem;
    background: var(--amber);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    cursor: pointer;
  }

  .btn-pagar:active { opacity: 0.8; }

  .btn-cancelar {
    width: 100%;
    padding: 0.8rem;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header class="app-header">
    <div class="logo">
      🍺 Barril & Orden
      <sub>Sistema de Mesas</sub>
    </div>
    <div id="clock"></div>
  </header>

  <!-- SCREENS -->
  <div class="screens">

    <!-- SCREEN 1: MESAS -->
    <div class="screen active" id="screen-mesas">
      <div class="mesas-screen">
        <div class="resumen-strip" id="resumenStrip"></div>
        <div class="screen-title">Mesas</div>
        <div class="mesas-grid" id="mesaGrid"></div>
      </div>
    </div>

    <!-- SCREEN 2: ORDEN -->
    <div class="screen" id="screen-orden">
      <div id="ordenContent"></div>
    </div>

    <!-- SCREEN 3: RESUMEN -->
    <div class="screen" id="screen-resumen">
      <div class="resumen-screen">
        <div class="screen-title">Turno actual</div>
        <div id="turnoStats"></div>
        <div class="screen-title" style="margin-top:0.8rem">Mesas activas</div>
        <div id="mesasActivasList"></div>
      </div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-mesas" onclick="goScreen('mesas')">
      <span class="nav-icon">🏠</span>
      Mesas
    </button>
    <button class="nav-btn" id="nav-orden" onclick="goScreen('orden')">
      <span class="nav-icon">📋</span>
      Orden
      <span class="nav-badge hidden" id="badgeOrden">0</span>
    </button>
    <button class="nav-btn" id="nav-resumen" onclick="goScreen('resumen')">
      <span class="nav-icon">📊</span>
      Turno
      <span class="nav-badge hidden" id="badgeCuentas"></span>
    </button>
  </nav>

</div>

<!-- MODAL CUENTA (bottom sheet) -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Cuenta — Mesa X</div>
    <div id="modalItems"></div>
    <div class="modal-total-big" id="modalTotal"></div>
    <div class="modal-iva" id="modalIva"></div>
    <div class="modal-btns">
      <button class="btn-pagar" onclick="confirmarPago()">✓ Mesa pagada — Cerrar mesa</button>
      <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// MENÚ
// ═══════════════════════════════════════
const MENU = [
  { id:1,  nombre:'Lager Artesanal',  cat:'Cerveza', desc:'Clara, refrescante, 4.5% alc.',     precio:85  },
  { id:2,  nombre:'IPA del Norte',    cat:'Cerveza', desc:'Lupulada intensa, 6.2% alc.',       precio:95  },
  { id:3,  nombre:'Stout Oscura',     cat:'Cerveza', desc:'Café y cacao, 5.8% alc.',           precio:95  },
  { id:4,  nombre:'Wheat Beer',       cat:'Cerveza', desc:'Fresca con notas cítricas, 4.8%',   precio:90  },
  { id:5,  nombre:'Red Ale',          cat:'Cerveza', desc:'Caramelo y malta, 5.5% alc.',        precio:90  },
  { id:6,  nombre:'Pinta Lager',      cat:'Cerveza', desc:'Medida grande 600ml',               precio:120 },
  { id:7,  nombre:'Pinta IPA',        cat:'Cerveza', desc:'Medida grande 600ml',               precio:135 },
  { id:8,  nombre:'Papas con Queso',  cat:'Botana',  desc:'Cheddar fundido, jalapeños',        precio:95  },
  { id:9,  nombre:'Alitas x6',        cat:'Botana',  desc:'BBQ o buffalo, con aderezo',        precio:145 },
  { id:10, nombre:'Nachos Clásicos',  cat:'Botana',  desc:'Guacamole, pico, crema',            precio:110 },
  { id:11, nombre:'Tabla Embutidos',  cat:'Botana',  desc:'Chorizo, salami, quesos',           precio:185 },
  { id:12, nombre:'Agua Mineral',     cat:'Extra',   desc:'600ml',                             precio:35  },
  { id:13, nombre:'Refresco',         cat:'Extra',   desc:'Lata 355ml',                        precio:40  },
  { id:14, nombre:'Mezcal Shot',      cat:'Extra',   desc:'Con naranja y sal de gusano',       precio:80  },
];

const CATS = ['Todos', ...new Set(MENU.map(i => i.cat))];

// ═══════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════
const NUM_MESAS = 8;
let mesas = {};
for (let i = 1; i <= NUM_MESAS; i++) {
  mesas[i] = { id: i, estado: 'libre', pedido: {}, hora: null };
}

let mesaActiva  = null;
let subTabActivo = 'pedido';
let catActiva   = 'Todos';
let mesaCerrando = null;
let screenActual = 'mesas';

// ═══════════════════════════════════════
// RELOJ
// ═══════════════════════════════════════
function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}
setInterval(tick, 1000); tick();

// ═══════════════════════════════════════
// NAVEGACIÓN
// ═══════════════════════════════════════
function goScreen(s) {
  screenActual = s;
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('screen-' + s).classList.add('active');
  document.getElementById('nav-' + s).classList.add('active');

  if (s === 'orden') renderOrden();
  if (s === 'resumen') renderResumen();
}

// ═══════════════════════════════════════
// UTILIDADES
// ═══════════════════════════════════════
function calcSubtotal(pedido) {
  return Object.values(pedido).reduce((s, i) => s + i.precio * i.qty, 0);
}
function calcItems(pedido) {
  return Object.values(pedido).reduce((s, i) => s + i.qty, 0);
}
function fmtPesos(n) { return '$' + Math.round(n).toLocaleString('es-MX'); }

// ═══════════════════════════════════════
// SCREEN 1: MESAS
// ═══════════════════════════════════════
function renderMesas() {
  // Resumen strip
  const ocupadas = Object.values(mesas).filter(m => m.estado !== 'libre');
  const totalVenta = ocupadas.reduce((s, m) => s + calcSubtotal(m.pedido) * 1.16, 0);
  const enCuenta = Object.values(mesas).filter(m => m.estado === 'cuenta').length;

  document.getElementById('resumenStrip').innerHTML = `
    <div class="resumen-chip">
      <div class="resumen-chip-val">${ocupadas.length}/${NUM_MESAS}</div>
      <div class="resumen-chip-label">Mesas</div>
    </div>
    <div class="resumen-chip">
      <div class="resumen-chip-val" style="font-size:1rem;margin-top:4px">${fmtPesos(totalVenta)}</div>
      <div class="resumen-chip-label">En curso</div>
    </div>
    <div class="resumen-chip">
      <div class="resumen-chip-val" style="color:${enCuenta > 0 ? 'var(--red)' : 'var(--amber)'}">${enCuenta}</div>
      <div class="resumen-chip-label">En cuenta</div>
    </div>
  `;

  // Grid mesas
  const grid = document.getElementById('mesaGrid');
  grid.innerHTML = '';
  for (let i = 1; i <= NUM_MESAS; i++) {
    const m = mesas[i];
    const sub = calcSubtotal(m.pedido);
    const total = sub * 1.16;
    const dotClass = m.estado === 'cuenta' ? 'cuenta' : m.estado;
    const card = document.createElement('div');
    card.className = `mesa-card ${m.estado} ${mesaActiva === i ? 'selected' : ''}`;
    card.onclick = () => seleccionarMesa(i);
    card.innerHTML = `
      <div class="mesa-card-header">
        <div class="mesa-num-big">${i}</div>
        <div class="mesa-dot ${dotClass}"></div>
      </div>
      <div class="mesa-estado">${m.estado === 'libre' ? 'Libre' : m.estado === 'cuenta' ? '💳 Cuenta' : 'Ocupada'}</div>
      ${m.estado !== 'libre' ? `<div class="mesa-total-card">${fmtPesos(total)}</div><div class="mesa-hora">${m.hora || ''}</div>` : ''}
    `;
    grid.appendChild(card);
  }

  // Badges nav
  const totalItems = mesaActiva && mesas[mesaActiva] ? calcItems(mesas[mesaActiva].pedido) : 0;
  const badge = document.getElementById('badgeOrden');
  badge.textContent = totalItems;
  badge.classList.toggle('hidden', totalItems === 0);

  const bc = document.getElementById('badgeCuentas');
  bc.textContent = enCuenta;
  bc.classList.toggle('hidden', enCuenta === 0);
}

function seleccionarMesa(id) {
  mesaActiva = id;
  const m = mesas[id];
  if (m.estado === 'libre') {
    m.estado = 'ocupada';
    m.hora = new Date().toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' });
  }
  renderMesas();
  goScreen('orden');
}

// ═══════════════════════════════════════
// SCREEN 2: ORDEN
// ═══════════════════════════════════════
function renderOrden() {
  const el = document.getElementById('ordenContent');

  if (!mesaActiva) {
    el.innerHTML = `
      <div class="orden-no-mesa">
        <div class="icon">🍻</div>
        <p>Selecciona una mesa primero</p>
        <button onclick="goScreen('mesas')" style="font-family:'DM Mono',monospace;font-size:0.7rem;padding:0.6rem 1.2rem;border:1px solid var(--amber-dim);background:transparent;color:var(--amber);border-radius:6px;cursor:pointer;margin-top:0.5rem">
          Ver mesas →
        </button>
      </div>`;
    return;
  }

  const m = mesas[mesaActiva];
  const sub = calcSubtotal(m.pedido);
  const iva = sub * 0.16;
  const total = sub + iva;
  const items = calcItems(m.pedido);

  el.innerHTML = `
    <div class="mesa-banner">
      <div class="mesa-banner-left">
        <div class="mesa-banner-num">${mesaActiva}</div>
        <div class="mesa-banner-info">
          <b>Mesa ${mesaActiva}</b><br>
          ${m.hora ? m.hora : 'Recién abierta'} · ${items} producto${items !== 1 ? 's' : ''}
        </div>
      </div>
      <button class="btn-sm btn-sm-cuenta" onclick="abrirCuenta()">💳 Cuenta</button>
    </div>

    <div class="sub-tabs">
      <button class="sub-tab ${subTabActivo === 'pedido' ? 'active' : ''}" onclick="setSubTab('pedido')">Orden actual</button>
      <button class="sub-tab ${subTabActivo === 'menu' ? 'active' : ''}" onclick="setSubTab('menu')">+ Agregar</button>
    </div>

    <div class="sub-panel ${subTabActivo === 'pedido' ? 'active' : ''}" id="panelPedido">
      <div class="pedido-lista" id="pedidoLista"></div>
      <div id="totalesBox"></div>
      ${items > 0 ? `<button class="btn-cuenta-full" onclick="abrirCuenta()">💳 Ver cuenta y cerrar mesa</button>` : ''}
      <div style="height:0.5rem"></div>
    </div>

    <div class="sub-panel ${subTabActivo === 'menu' ? 'active' : ''}" id="panelMenu">
      <div class="menu-panel">
        <div class="cat-scroll" id="catScroll"></div>
        <div id="menuItems"></div>
      </div>
    </div>
  `;

  renderPedidoLista();
  renderMenuItems();
}

function setSubTab(tab) {
  subTabActivo = tab;
  renderOrden();
}

function renderPedidoLista() {
  const m = mesas[mesaActiva];
  const lista = document.getElementById('pedidoLista');
  const totBox = document.getElementById('totalesBox');
  const keys = Object.keys(m.pedido);

  if (!lista) return;

  if (keys.length === 0) {
    lista.innerHTML = `<div class="pedido-empty">Sin productos aún.<br>Ve a "Agregar" para ordenar →</div>`;
    if (totBox) totBox.innerHTML = '';
    return;
  }

  lista.innerHTML = keys.map(id => {
    const item = m.pedido[id];
    return `
      <div class="pedido-item">
        <div>
          <div class="item-name">${item.nombre}</div>
          <div class="item-cat">${item.cat}</div>
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="cambiarQty(${id},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="cambiarQty(${id},1)">+</button>
        </div>
        <div class="item-price">${fmtPesos(item.precio * item.qty)}</div>
      </div>`;
  }).join('');

  const sub = calcSubtotal(m.pedido);
  const iva = sub * 0.16;
  const total = sub + iva;

  if (totBox) totBox.innerHTML = `
    <div class="totales-box">
      <div class="totales-row"><span>Subtotal</span><span>${fmtPesos(sub)}</span></div>
      <div class="totales-row"><span>IVA (16%)</span><span>${fmtPesos(iva)}</span></div>
      <div class="totales-row grand"><span>Total</span><span>${fmtPesos(total)}</span></div>
    </div>`;
}

function renderMenuItems() {
  const catEl = document.getElementById('catScroll');
  const itemsEl = document.getElementById('menuItems');
  if (!catEl || !itemsEl) return;

  catEl.innerHTML = CATS.map(c =>
    `<button class="cat-pill ${catActiva === c ? 'active' : ''}" onclick="filtrarCat('${c}')">${c}</button>`
  ).join('');

  const filtered = catActiva === 'Todos' ? MENU : MENU.filter(i => i.cat === catActiva);
  itemsEl.innerHTML = filtered.map(item => `
    <div class="menu-item" id="mi-${item.id}">
      <div>
        <div class="menu-item-name">${item.nombre}</div>
        <div class="menu-item-desc">${item.desc}</div>
      </div>
      <div class="menu-item-right">
        <div class="menu-item-price">${fmtPesos(item.precio)}</div>
        <button class="add-btn" onclick="agregarItem(${item.id})">+</button>
      </div>
    </div>`
  ).join('');
}

function filtrarCat(cat) {
  catActiva = cat;
  renderMenuItems();
  // Re-render solo las pills sin rerenderizar todo
  document.querySelectorAll('.cat-pill').forEach(b => {
    b.classList.toggle('active', b.textContent === cat);
  });
}

function cambiarQty(id, delta) {
  const m = mesas[mesaActiva];
  if (!m.pedido[id]) return;
  m.pedido[id].qty += delta;
  if (m.pedido[id].qty <= 0) delete m.pedido[id];
  renderPedidoLista();
  renderMesas();
  // Actualizar botón cuenta-full
  const items = calcItems(m.pedido);
  const btnCuenta = document.querySelector('.btn-cuenta-full');
  if (items === 0 && btnCuenta) btnCuenta.remove();
}

function agregarItem(id) {
  const m = mesas[mesaActiva];
  const prod = MENU.find(p => p.id === id);
  if (!prod) return;

  if (m.pedido[id]) m.pedido[id].qty++;
  else m.pedido[id] = { ...prod, qty: 1 };

  // Flash visual en el botón
  const el = document.getElementById('mi-' + id);
  if (el) {
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 280);
  }
  renderMesas();
}

// ═══════════════════════════════════════
// SCREEN 3: RESUMEN TURNO
// ═══════════════════════════════════════
function renderResumen() {
  const ocupadas = Object.values(mesas).filter(m => m.estado !== 'libre');
  const totalVenta = ocupadas.reduce((s, m) => s + calcSubtotal(m.pedido) * 1.16, 0);
  const enCuenta = ocupadas.filter(m => m.estado === 'cuenta');

  document.getElementById('turnoStats').innerHTML = `
    <div class="turno-card">
      <div class="turno-card-title">Estadísticas</div>
      <div class="turno-stat"><span>Mesas activas</span><span>${ocupadas.length} de ${NUM_MESAS}</span></div>
      <div class="turno-stat"><span>Mesas libres</span><span>${NUM_MESAS - ocupadas.length}</span></div>
      <div class="turno-stat"><span>En espera de cuenta</span><span style="color:var(--red)">${enCuenta.length}</span></div>
      <div class="turno-stat"><span>Venta acumulada</span><span>${fmtPesos(totalVenta)}</span></div>
    </div>`;

  const listEl = document.getElementById('mesasActivasList');
  if (ocupadas.length === 0) {
    listEl.innerHTML = `<div style="color:var(--muted);font-size:0.72rem;text-align:center;padding:2rem">Sin mesas activas</div>`;
    return;
  }

  listEl.innerHTML = ocupadas.map(m => {
    const total = calcSubtotal(m.pedido) * 1.16;
    const items = calcItems(m.pedido);
    return `
      <div class="mesas-list-item ${m.estado === 'cuenta' ? 'cuenta-pend' : ''}" onclick="seleccionarMesa(${m.id})">
        <div class="mli-left">
          <div class="mli-num">${m.id}</div>
          <div class="mli-info">
            <b>${m.estado === 'cuenta' ? '💳 En cuenta' : 'Ocupada'}</b><br>
            ${m.hora || ''} · ${items} producto${items !== 1 ? 's' : ''}
          </div>
        </div>
        <div class="mli-total">${fmtPesos(total)}</div>
      </div>`;
  }).join('');
}

// ═══════════════════════════════════════
// MODAL CUENTA
// ═══════════════════════════════════════
function abrirCuenta() {
  const m = mesas[mesaActiva];
  if (Object.keys(m.pedido).length === 0) return;
  m.estado = 'cuenta';
  mesaCerrando = mesaActiva;

  const sub = calcSubtotal(m.pedido);
  const iva = sub * 0.16;
  const total = sub + iva;

  document.getElementById('modalTitle').textContent = `Cuenta — Mesa ${mesaActiva}`;
  document.getElementById('modalItems').innerHTML = Object.values(m.pedido).map(item => `
    <div class="modal-item-row">
      <span><span class="qty">${item.qty}×</span>${item.nombre}</span>
      <span>${fmtPesos(item.precio * item.qty)}</span>
    </div>`).join('') + `
    <div class="modal-item-row" style="color:var(--muted);margin-top:0.4rem">
      <span>IVA (16%)</span><span>${fmtPesos(iva)}</span>
    </div>`;

  document.getElementById('modalTotal').innerHTML = `<span>TOTAL</span> ${fmtPesos(total)}`;
  document.getElementById('modalIva').textContent = `Subtotal: ${fmtPesos(sub)}`;
  document.getElementById('modalOverlay').classList.remove('hidden');
  renderMesas();
}

function cerrarModal() {
  if (mesaCerrando) {
    const m = mesas[mesaCerrando];
    if (m.estado === 'cuenta') m.estado = 'ocupada';
  }
  document.getElementById('modalOverlay').classList.add('hidden');
  mesaCerrando = null;
  renderMesas();
}

function confirmarPago() {
  if (!mesaCerrando) return;
  mesas[mesaCerrando] = { id: mesaCerrando, estado: 'libre', pedido: {}, hora: null };
  document.getElementById('modalOverlay').classList.add('hidden');
  if (mesaActiva === mesaCerrando) mesaActiva = null;
  mesaCerrando = null;
  renderMesas();
  goScreen('mesas');
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
renderMesas();
</script>
</body>
</html>
