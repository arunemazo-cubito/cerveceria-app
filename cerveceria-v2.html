<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Barril & Orden</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Crimson+Pro:ital@1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0d0a;--surface:#1a1714;--surface2:#242018;--border:#3a3228;
    --amber:#e8a020;--amber-dim:#a06a10;--amber-glow:rgba(232,160,32,0.12);
    --cream:#f0e8d0;--muted:#7a6e5e;--green:#4a8c5c;--red:#c04030;
    --text:#e8dfc8;--safe-bottom:env(safe-area-inset-bottom,0px);
    --nav-h:64px;--header-h:56px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overscroll-behavior:none}
  #app{display:flex;flex-direction:column;height:100dvh}

  /* HEADER */
  .app-header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1rem;flex-shrink:0;z-index:10}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--amber);letter-spacing:.06em}
  .logo sub{font-size:.55rem;color:var(--muted);font-family:'DM Mono',monospace;display:block;letter-spacing:.15em;margin-top:-4px}
  #clock{font-size:.75rem;color:var(--amber)}
  .sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px;background:var(--muted)}
  .sync-dot.ok{background:var(--green);box-shadow:0 0 5px var(--green)}
  .sync-dot.error{background:var(--red)}
  .sync-dot.syncing{background:var(--amber);animation:pulse .8s ease infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* SCREENS */
  .screens{flex:1;overflow:hidden;position:relative}
  .screen{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;display:none;padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 8px)}
  .screen.active{display:block}

  /* NAV */
  .bottom-nav{height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--surface);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr 1fr 1fr;flex-shrink:0;z-index:10}
  .nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;transition:color .15s;padding:0;position:relative}
  .nav-btn.active{color:var(--amber)}
  .nav-btn .nav-icon{font-size:1.2rem;line-height:1}
  .nav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:white;font-size:.55rem;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .nav-badge.hidden{display:none}

  /* COMUNES */
  .screen-title{font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.25em;color:var(--muted);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
  .pad{padding:1rem}

  /* MESAS */
  .resumen-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:1rem}
  .resumen-chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.6rem .5rem;text-align:center}
  .resumen-chip-val{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--amber);line-height:1}
  .resumen-chip-label{font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
  .mesas-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem}
  .mesa-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem .8rem;cursor:pointer;transition:all .15s;position:relative}
  .mesa-card:active{transform:scale(.97)}
  .mesa-card.ocupada{border-color:var(--amber-dim)}
  .mesa-card.cuenta{border-color:var(--red);background:rgba(192,64,48,.06)}
  .mesa-card.selected{border-color:var(--amber);background:var(--amber-glow);box-shadow:0 0 16px var(--amber-glow)}
  .mesa-card-header{display:flex;justify-content:space-between;align-items:flex-start}
  .mesa-num-big{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;color:var(--amber);line-height:1}
  .mesa-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
  .mesa-dot.libre{background:var(--muted)}
  .mesa-dot.ocupada{background:var(--amber);box-shadow:0 0 6px var(--amber)}
  .mesa-dot.cuenta{background:var(--red);box-shadow:0 0 6px var(--red)}
  .mesa-estado{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:4px}
  .mesa-card.ocupada .mesa-estado{color:var(--amber-dim)}
  .mesa-card.cuenta .mesa-estado{color:var(--red)}
  .mesa-total-card{font-size:.8rem;color:var(--cream);margin-top:6px;font-weight:500}
  .mesa-hora{font-size:.58rem;color:var(--muted);margin-top:2px}

  /* ORDEN */
  .orden-no-mesa{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:var(--muted);gap:.8rem;font-size:.75rem}
  .orden-no-mesa .icon{font-size:3rem;opacity:.3}
  .sub-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:5}
  .sub-tab{flex:1;padding:.75rem .5rem;text-align:center;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:transparent;border-top:none;border-left:none;border-right:none;font-family:'DM Mono',monospace}
  .sub-tab.active{color:var(--amber);border-bottom-color:var(--amber)}
  .sub-panel{display:none}
  .sub-panel.active{display:block}
  .mesa-banner{background:var(--surface);padding:.8rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .mesa-banner-left{display:flex;align-items:center;gap:.6rem}
  .mesa-banner-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--amber);line-height:1}
  .mesa-banner-info{font-size:.62rem;color:var(--muted);line-height:1.5}
  .mesa-banner-info b{color:var(--cream)}
  .btn-sm{font-family:'DM Mono',monospace;font-size:.6rem;padding:.4rem .8rem;border-radius:4px;cursor:pointer;text-transform:uppercase;letter-spacing:.08em;transition:all .15s;border:1px solid}
  .btn-sm-cuenta{color:var(--amber);border-color:var(--amber-dim);background:transparent}
  .pedido-lista{padding:0 1rem}
  .pedido-empty{text-align:center;color:var(--muted);font-size:.72rem;padding:3rem 1rem;line-height:2}
  .pedido-item{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:.6rem;padding:.9rem 0;border-bottom:1px solid var(--border)}
  .item-name{font-size:.78rem;color:var(--cream)}
  .item-cat{font-size:.58rem;color:var(--muted);margin-top:2px}
  .qty-ctrl{display:flex;align-items:center;gap:.35rem}
  .qty-btn{width:28px;height:28px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;border-radius:4px;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .1s;flex-shrink:0}
  .qty-btn:active{border-color:var(--amber);color:var(--amber);transform:scale(.92)}
  .qty-num{font-size:.9rem;color:var(--amber);min-width:22px;text-align:center;font-weight:500}
  .item-price{font-size:.78rem;color:var(--cream);text-align:right;min-width:60px}
  .totales-box{margin:.8rem 1rem 0;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .totales-row{display:flex;justify-content:space-between;font-size:.7rem;padding:.6rem 1rem;border-bottom:1px solid var(--border);color:var(--muted)}
  .totales-row:last-child{border-bottom:none}
  .totales-row.grand{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--amber);padding:.8rem 1rem}
  .btn-cuenta-full{margin:.8rem 1rem 0;width:calc(100% - 2rem);padding:1rem;background:var(--amber);color:var(--bg);border:none;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;cursor:pointer}
  .btn-cuenta-full:active{opacity:.8}

  /* MENÚ */
  .menu-panel{padding:0 1rem}
  .cat-scroll{display:flex;gap:.4rem;overflow-x:auto;padding:.8rem 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .cat-scroll::-webkit-scrollbar{display:none}
  .cat-pill{font-family:'DM Mono',monospace;font-size:.62rem;padding:.35rem .8rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:20px;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;transition:all .12s;flex-shrink:0}
  .cat-pill.active{border-color:var(--amber);color:var(--amber);background:var(--amber-glow)}
  .menu-item{display:flex;justify-content:space-between;align-items:center;padding:.9rem .8rem;border-radius:8px;cursor:pointer;transition:all .12s;border:1px solid transparent;margin-bottom:.3rem}
  .menu-item:active{background:var(--surface2);border-color:var(--amber-dim);transform:scale(.98)}
  .menu-item.flash{background:var(--amber-glow);border-color:var(--amber-dim)}
  .menu-item-name{font-size:.78rem;color:var(--cream)}
  .menu-item-desc{font-size:.62rem;color:var(--muted);margin-top:2px;font-family:'Crimson Pro',serif;font-style:italic}
  .menu-item-right{display:flex;align-items:center;gap:.6rem;flex-shrink:0}
  .menu-item-price{font-size:.78rem;color:var(--amber);white-space:nowrap}
  .add-btn{width:28px;height:28px;background:var(--amber);color:var(--bg);border:none;border-radius:50%;font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .1s}
  .add-btn:active{transform:scale(.88)}
  .menu-loading{text-align:center;color:var(--muted);font-size:.72rem;padding:3rem 1rem}

  /* REPORTES */
  .reporte-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:5}
  .reporte-tab{flex:1;padding:.7rem .3rem;text-align:center;font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;background:transparent;border-top:none;border-left:none;border-right:none;font-family:'DM Mono',monospace;transition:all .15s}
  .reporte-tab.active{color:var(--amber);border-bottom-color:var(--amber)}
  .rep-panel{display:none;padding:1rem}
  .rep-panel.active{display:block}
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.8rem;text-align:center}
  .kpi-val{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--amber);line-height:1}
  .kpi-val.full{font-size:1.2rem}
  .kpi-label{font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
  .mesa-reporte-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.8rem 1rem;margin-bottom:.5rem;display:flex;justify-content:space-between;align-items:center}
  .mri-left{}
  .mri-num{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--amber);line-height:1}
  .mri-sub{font-size:.6rem;color:var(--muted);margin-top:2px}
  .mri-total{text-align:right}
  .mri-total-val{font-size:.9rem;color:var(--cream);font-weight:500}
  .mri-ordenes{font-size:.6rem;color:var(--muted);margin-top:2px}
  .rep-empty{text-align:center;color:var(--muted);font-size:.72rem;padding:3rem 1rem;line-height:2}
  .rep-loading{text-align:center;color:var(--muted);font-size:.72rem;padding:2rem 1rem}
  .rep-fecha{font-size:.65rem;color:var(--muted);margin-bottom:.8rem;text-align:right}

  /* CONFIG */
  .config-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.8rem 1rem;margin-bottom:.8rem}
  .config-label{font-size:.65rem;color:var(--muted);margin-bottom:.5rem}
  .config-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--cream);font-family:'DM Mono',monospace;font-size:.62rem;padding:.6rem .7rem;border-radius:4px;outline:none}
  .config-hint{font-size:.58rem;color:var(--muted);margin-top:.4rem}
  .btn-reload-menu{width:100%;margin-top:.5rem;padding:.7rem;background:transparent;border:1px solid var(--amber-dim);color:var(--amber);border-radius:6px;font-family:'DM Mono',monospace;font-size:.65rem;cursor:pointer;text-transform:uppercase;letter-spacing:.08em}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(10,8,6,.9);display:flex;align-items:flex-end;z-index:200;backdrop-filter:blur(4px)}
  .modal-overlay.hidden{display:none}
  .modal-sheet{background:var(--surface);border-top:1px solid var(--border);border-radius:16px 16px 0 0;padding:1.5rem 1.2rem;padding-bottom:calc(1.5rem + var(--safe-bottom));width:100%;max-height:85dvh;overflow-y:auto;animation:slideUp .25s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.2rem}
  .modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--amber);margin-bottom:1rem}
  .modal-item-row{display:flex;justify-content:space-between;font-size:.75rem;padding:.5rem 0;border-bottom:1px solid var(--border);color:var(--text)}
  .modal-item-row .qty{color:var(--muted);margin-right:.4rem}
  .modal-total-big{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--amber);text-align:right;margin:1rem 0 .3rem}
  .modal-total-big span{font-size:.8rem;color:var(--muted);font-family:'DM Mono',monospace;vertical-align:middle;margin-right:.3rem}
  .modal-iva{font-size:.62rem;color:var(--muted);text-align:right;margin-bottom:1rem}
  .modal-btns{display:flex;flex-direction:column;gap:.6rem}
  .btn-pagar{width:100%;padding:1rem;background:var(--amber);color:var(--bg);border:none;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.08em;cursor:pointer}
  .btn-pagar:disabled{opacity:.5;cursor:not-allowed}
  .btn-cancelar{width:100%;padding:.8rem;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;font-family:'DM Mono',monospace;font-size:.7rem;cursor:pointer}

  /* TOAST */
  .toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.7rem 1.2rem;font-size:.72rem;color:var(--text);z-index:300;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.success{border-color:var(--green);color:var(--green)}
  .toast.error{border-color:var(--red);color:var(--red)}

  ::-webkit-scrollbar{width:3px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border)}
</style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="logo">🍺 Barril & Orden<sub>v2 — Sheets Live</sub></div>
    <div style="display:flex;align-items:center;gap:.5rem">
      <span class="sync-dot" id="syncDot"></span>
      <div id="clock"></div>
    </div>
  </header>

  <div class="screens">
    <!-- MESAS -->
    <div class="screen active" id="screen-mesas">
      <div class="pad">
        <div class="resumen-strip" id="resumenStrip"></div>
        <div class="screen-title">Mesas</div>
        <div class="mesas-grid" id="mesaGrid"></div>
      </div>
    </div>

    <!-- ORDEN -->
    <div class="screen" id="screen-orden">
      <div id="ordenContent"></div>
    </div>

    <!-- REPORTES -->
    <div class="screen" id="screen-reportes">
      <div class="reporte-tabs">
        <button class="reporte-tab active" id="rtab-mesas" onclick="setRepTab('mesas')">Por mesa</button>
        <button class="reporte-tab" id="rtab-diario" onclick="setRepTab('diario')">Día total</button>
      </div>
      <div class="rep-panel active" id="repanel-mesas">
        <div class="rep-fecha" id="rep-fecha-mesas"></div>
        <div id="rep-mesas-content"><div class="rep-loading">Cargando...</div></div>
      </div>
      <div class="rep-panel" id="repanel-diario">
        <div class="rep-fecha" id="rep-fecha-diario"></div>
        <div id="rep-diario-content"><div class="rep-loading">Cargando...</div></div>
      </div>
    </div>

    <!-- CONFIG -->
    <div class="screen" id="screen-config">
      <div class="pad">
        <div class="screen-title">Configuración</div>
        <div class="config-card">
          <div class="config-label">URL de Google Apps Script</div>
          <input id="scriptUrlInput" class="config-input" type="url"
            placeholder="https://script.google.com/macros/s/..."
            oninput="guardarScriptUrl(this.value)">
          <div class="config-hint">Pega aquí la URL del Apps Script v2 desplegado</div>
          <button class="btn-reload-menu" onclick="cargarMenu()">↺ Recargar menú desde Sheets</button>
        </div>
        <div class="config-card">
          <div class="config-label">Estado del menú</div>
          <div id="menuStatus" style="font-size:.68rem;color:var(--muted);line-height:1.8"></div>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-mesas" onclick="goScreen('mesas')">
      <span class="nav-icon">🏠</span>Mesas
    </button>
    <button class="nav-btn" id="nav-orden" onclick="goScreen('orden')">
      <span class="nav-icon">📋</span>Orden
      <span class="nav-badge hidden" id="badgeOrden"></span>
    </button>
    <button class="nav-btn" id="nav-reportes" onclick="goScreen('reportes');cargarReportes()">
      <span class="nav-icon">📊</span>Reportes
    </button>
    <button class="nav-btn" id="nav-config" onclick="goScreen('config');initConfig()">
      <span class="nav-icon">⚙️</span>Config
    </button>
  </nav>
</div>

<!-- MODAL CUENTA -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalItems"></div>
    <div class="modal-total-big" id="modalTotal"></div>
    <div class="modal-iva" id="modalIva"></div>
    <div class="modal-btns">
      <button class="btn-pagar" id="btnPagar" onclick="confirmarPago()">✓ Mesa pagada — Cerrar mesa</button>
      <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════
let SCRIPT_URL = localStorage.getItem('scriptUrl') || '';

function guardarScriptUrl(url) {
  SCRIPT_URL = url.trim();
  localStorage.setItem('scriptUrl', SCRIPT_URL);
  setSyncDot('');
}

// ══════════════════════════════════════════════════
// MENÚ DINÁMICO
// ══════════════════════════════════════════════════
const MENU_FALLBACK = [
  {id:1,nombre:'Lager Artesanal',cat:'Cerveza',desc:'Clara, refrescante, 4.5%',precio:85},
  {id:2,nombre:'IPA del Norte',cat:'Cerveza',desc:'Lupulada intensa, 6.2%',precio:95},
  {id:3,nombre:'Stout Oscura',cat:'Cerveza',desc:'Café y cacao, 5.8%',precio:95},
  {id:4,nombre:'Wheat Beer',cat:'Cerveza',desc:'Notas cítricas, 4.8%',precio:90},
  {id:5,nombre:'Red Ale',cat:'Cerveza',desc:'Caramelo y malta, 5.5%',precio:90},
  {id:6,nombre:'Pinta Lager',cat:'Cerveza',desc:'600ml',precio:120},
  {id:7,nombre:'Pinta IPA',cat:'Cerveza',desc:'600ml',precio:135},
  {id:8,nombre:'Papas con Queso',cat:'Botana',desc:'Cheddar, jalapeños',precio:95},
  {id:9,nombre:'Alitas x6',cat:'Botana',desc:'BBQ o buffalo',precio:145},
  {id:10,nombre:'Nachos Clásicos',cat:'Botana',desc:'Guacamole, pico, crema',precio:110},
  {id:11,nombre:'Tabla Embutidos',cat:'Botana',desc:'Chorizo, salami, quesos',precio:185},
  {id:12,nombre:'Agua Mineral',cat:'Extra',desc:'600ml',precio:35},
  {id:13,nombre:'Refresco',cat:'Extra',desc:'Lata 355ml',precio:40},
  {id:14,nombre:'Mezcal Shot',cat:'Extra',desc:'Naranja y sal de gusano',precio:80},
];

let MENU = JSON.parse(localStorage.getItem('menuCache') || 'null') || MENU_FALLBACK;

async function cargarMenu() {
  if (!SCRIPT_URL) {
    actualizarMenuStatus('Sin URL configurada — usando menú local');
    return;
  }
  actualizarMenuStatus('⏳ Cargando menú desde Sheets...');
  try {
    const url = SCRIPT_URL + (SCRIPT_URL.includes('?') ? '&' : '?') + 'accion=get_menu';
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.ok && data.productos && data.productos.length > 0) {
      MENU = data.productos;
      localStorage.setItem('menuCache', JSON.stringify(MENU));
      actualizarMenuStatus('✓ ' + MENU.length + ' productos cargados desde Sheets');
      showToast('Menú actualizado desde Sheets', 'success');
    } else {
      actualizarMenuStatus('⚠ Error al cargar — usando menú local (' + (data.error || '') + ')');
    }
  } catch(e) {
    actualizarMenuStatus('⚠ Sin conexión — usando menú local');
  }
}

function actualizarMenuStatus(msg) {
  const el = document.getElementById('menuStatus');
  if (el) el.innerHTML = msg + '<br><span style="color:var(--amber)">' + MENU.length + ' productos activos</span>';
}

// Cargar menú al inicio si hay URL
window.addEventListener('load', function() {
  if (SCRIPT_URL) cargarMenu();
});

// ══════════════════════════════════════════════════
// ESTADO MESAS
// ══════════════════════════════════════════════════
const NUM_MESAS = 8;
let mesas = {};
for (let i = 1; i <= NUM_MESAS; i++) {
  mesas[i] = {id:i, estado:'libre', pedido:{}, hora:null};
}
let mesaActiva = null, subTabActivo = 'pedido', catActiva = 'Todos', mesaCerrando = null;

// ══════════════════════════════════════════════════
// RELOJ + UTILS
// ══════════════════════════════════════════════════
function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(tick,1000); tick();

function setSyncDot(s) {
  const d = document.getElementById('syncDot');
  d.className = 'sync-dot' + (s ? ' '+s : '');
}

let toastTimer;
function showToast(msg, tipo) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (tipo ? ' '+tipo : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

function calcSub(pedido){ return Object.values(pedido).reduce((s,i)=>s+i.precio*i.qty,0); }
function calcItems(pedido){ return Object.values(pedido).reduce((s,i)=>s+i.qty,0); }
function fmtPesos(n){ return '$'+Math.round(n).toLocaleString('es-MX'); }

function goScreen(s) {
  document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('screen-'+s).classList.add('active');
  document.getElementById('nav-'+s).classList.add('active');
  if (s==='orden') renderOrden();
}

// ══════════════════════════════════════════════════
// SCREEN 1: MESAS
// ══════════════════════════════════════════════════
function renderMesas() {
  const ocupadas   = Object.values(mesas).filter(m=>m.estado!=='libre');
  const totalVenta = ocupadas.reduce((s,m)=>s+calcSub(m.pedido)*1.16,0);
  const enCuenta   = Object.values(mesas).filter(m=>m.estado==='cuenta').length;

  document.getElementById('resumenStrip').innerHTML = `
    <div class="resumen-chip"><div class="resumen-chip-val">${ocupadas.length}/${NUM_MESAS}</div><div class="resumen-chip-label">Mesas</div></div>
    <div class="resumen-chip"><div class="resumen-chip-val" style="font-size:1rem;margin-top:4px">${fmtPesos(totalVenta)}</div><div class="resumen-chip-label">En curso</div></div>
    <div class="resumen-chip"><div class="resumen-chip-val" style="color:${enCuenta>0?'var(--red)':'var(--amber)'}">${enCuenta}</div><div class="resumen-chip-label">En cuenta</div></div>`;

  const grid = document.getElementById('mesaGrid');
  grid.innerHTML = '';
  for (let i=1;i<=NUM_MESAS;i++) {
    const m=mesas[i], total=calcSub(m.pedido)*1.16, dot=m.estado==='cuenta'?'cuenta':m.estado;
    const card=document.createElement('div');
    card.className=`mesa-card ${m.estado} ${mesaActiva===i?'selected':''}`;
    card.onclick=()=>seleccionarMesa(i);
    card.innerHTML=`
      <div class="mesa-card-header"><div class="mesa-num-big">${i}</div><div class="mesa-dot ${dot}"></div></div>
      <div class="mesa-estado">${m.estado==='libre'?'Libre':m.estado==='cuenta'?'💳 Cuenta':'Ocupada'}</div>
      ${m.estado!=='libre'?`<div class="mesa-total-card">${fmtPesos(total)}</div><div class="mesa-hora">${m.hora||''}</div>`:''}`;
    grid.appendChild(card);
  }
  const items=mesaActiva&&mesas[mesaActiva]?calcItems(mesas[mesaActiva].pedido):0;
  const b=document.getElementById('badgeOrden');
  b.textContent=items; b.classList.toggle('hidden',items===0);
}

function seleccionarMesa(id) {
  mesaActiva=id;
  const m=mesas[id];
  if (m.estado==='libre') { m.estado='ocupada'; m.hora=new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}); }
  renderMesas(); goScreen('orden');
}

// ══════════════════════════════════════════════════
// SCREEN 2: ORDEN
// ══════════════════════════════════════════════════
function renderOrden() {
  const el=document.getElementById('ordenContent');
  if (!mesaActiva) {
    el.innerHTML=`<div class="orden-no-mesa"><div class="icon">🍻</div><p>Selecciona una mesa primero</p><button onclick="goScreen('mesas')" style="font-family:'DM Mono',monospace;font-size:.7rem;padding:.6rem 1.2rem;border:1px solid var(--amber-dim);background:transparent;color:var(--amber);border-radius:6px;cursor:pointer;margin-top:.5rem">Ver mesas →</button></div>`;
    return;
  }
  const m=mesas[mesaActiva], items=calcItems(m.pedido);
  el.innerHTML=`
    <div class="mesa-banner">
      <div class="mesa-banner-left">
        <div class="mesa-banner-num">${mesaActiva}</div>
        <div class="mesa-banner-info"><b>Mesa ${mesaActiva}</b><br>${m.hora||'Recién abierta'} · ${items} producto${items!==1?'s':''}</div>
      </div>
      <button class="btn-sm btn-sm-cuenta" onclick="abrirCuenta()">💳 Cuenta</button>
    </div>
    <div class="sub-tabs">
      <button class="sub-tab ${subTabActivo==='pedido'?'active':''}" onclick="setSubTab('pedido')">Orden actual</button>
      <button class="sub-tab ${subTabActivo==='menu'?'active':''}" onclick="setSubTab('menu')">+ Agregar</button>
    </div>
    <div class="sub-panel ${subTabActivo==='pedido'?'active':''}" id="panelPedido">
      <div class="pedido-lista" id="pedidoLista"></div>
      <div id="totalesBox"></div>
      ${items>0?`<button class="btn-cuenta-full" onclick="abrirCuenta()">💳 Ver cuenta y cerrar mesa</button>`:''}
      <div style="height:.5rem"></div>
    </div>
    <div class="sub-panel ${subTabActivo==='menu'?'active':''}" id="panelMenu">
      <div class="menu-panel">
        <div class="cat-scroll" id="catScroll"></div>
        <div id="menuItems"></div>
      </div>
    </div>`;
  renderPedidoLista();
  renderMenuItems();
}

function setSubTab(tab){ subTabActivo=tab; renderOrden(); }

function renderPedidoLista() {
  const m=mesas[mesaActiva], lista=document.getElementById('pedidoLista'), totBox=document.getElementById('totalesBox');
  const keys=Object.keys(m.pedido);
  if (!lista) return;
  if (keys.length===0) { lista.innerHTML=`<div class="pedido-empty">Sin productos aún.<br>Ve a "Agregar" →</div>`; if(totBox)totBox.innerHTML=''; return; }
  lista.innerHTML=keys.map(id=>{
    const item=m.pedido[id];
    return `<div class="pedido-item">
      <div><div class="item-name">${item.nombre}</div><div class="item-cat">${item.cat}</div></div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="cambiarQty(${id},-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="cambiarQty(${id},1)">+</button>
      </div>
      <div class="item-price">${fmtPesos(item.precio*item.qty)}</div>
    </div>`;
  }).join('');
  const sub=calcSub(m.pedido), iva=sub*.16, total=sub+iva;
  if (totBox) totBox.innerHTML=`<div class="totales-box">
    <div class="totales-row"><span>Subtotal</span><span>${fmtPesos(sub)}</span></div>
    <div class="totales-row"><span>IVA (16%)</span><span>${fmtPesos(iva)}</span></div>
    <div class="totales-row grand"><span>Total</span><span>${fmtPesos(total)}</span></div>
  </div>`;
}

function renderMenuItems() {
  const catEl=document.getElementById('catScroll'), itemsEl=document.getElementById('menuItems');
  if (!catEl||!itemsEl) return;
  const CATS=['Todos',...new Set(MENU.map(i=>i.cat))];
  catEl.innerHTML=CATS.map(c=>`<button class="cat-pill ${catActiva===c?'active':''}" onclick="filtrarCat('${c}')">${c}</button>`).join('');
  const filtered=catActiva==='Todos'?MENU:MENU.filter(i=>i.cat===catActiva);
  itemsEl.innerHTML=filtered.map(item=>`
    <div class="menu-item" id="mi-${item.id}">
      <div><div class="menu-item-name">${item.nombre}</div><div class="menu-item-desc">${item.desc||''}</div></div>
      <div class="menu-item-right">
        <div class="menu-item-price">${fmtPesos(item.precio)}</div>
        <button class="add-btn" onclick="agregarItem(${item.id})">+</button>
      </div>
    </div>`).join('');
}

function filtrarCat(cat) {
  catActiva=cat;
  renderMenuItems();
  document.querySelectorAll('.cat-pill').forEach(b=>b.classList.toggle('active',b.textContent===cat));
}

function cambiarQty(id, delta) {
  const m=mesas[mesaActiva];
  if (!m.pedido[id]) return;
  m.pedido[id].qty+=delta;
  if (m.pedido[id].qty<=0) delete m.pedido[id];
  renderPedidoLista(); renderMesas();
}

function agregarItem(id) {
  const m=mesas[mesaActiva], prod=MENU.find(p=>p.id==id);
  if (!prod) return;
  if (m.pedido[id]) m.pedido[id].qty++;
  else m.pedido[id]={...prod, qty:1};
  const el=document.getElementById('mi-'+id);
  if (el){el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),280);}
  renderMesas();
}

// ══════════════════════════════════════════════════
// SCREEN 3: REPORTES (desde Sheets)
// ══════════════════════════════════════════════════
let repTabActivo = 'mesas';
let reporteData  = null;

function setRepTab(tab) {
  repTabActivo = tab;
  document.querySelectorAll('.reporte-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.rep-panel').forEach(b=>b.classList.remove('active'));
  document.getElementById('rtab-'+tab).classList.add('active');
  document.getElementById('repanel-'+tab).classList.add('active');
}

async function cargarReportes() {
  if (!SCRIPT_URL) {
    renderReportesLocal();
    return;
  }
  try {
    const url = SCRIPT_URL + (SCRIPT_URL.includes('?') ? '&' : '?') + 'accion=get_reportes';
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.ok) {
      reporteData = data;
      renderReportesSheets(data);
    } else {
      renderReportesLocal();
    }
  } catch(e) {
    renderReportesLocal();
  }
}

// Reportes desde datos locales (turno actual en memoria)
function renderReportesLocal() {
  const hoy = new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'});

  // Por mesa
  const ocupadas = Object.values(mesas).filter(m=>m.estado!=='libre');
  const fechaEl1 = document.getElementById('rep-fecha-mesas');
  const fechaEl2 = document.getElementById('rep-fecha-diario');
  if(fechaEl1) fechaEl1.textContent = hoy + ' — datos del turno actual';
  if(fechaEl2) fechaEl2.textContent = hoy + ' — datos del turno actual';

  const contMesas = document.getElementById('rep-mesas-content');
  if (ocupadas.length === 0) {
    contMesas.innerHTML = `<div class="rep-empty">Sin mesas activas en este turno</div>`;
  } else {
    contMesas.innerHTML = ocupadas.map(m => {
      const sub=calcSub(m.pedido), total=sub*1.16, items=calcItems(m.pedido);
      return `<div class="mesa-reporte-item">
        <div class="mri-left">
          <div class="mri-num">Mesa ${m.id}</div>
          <div class="mri-sub">${m.hora||''} · ${items} producto${items!==1?'s':''}</div>
        </div>
        <div class="mri-total">
          <div class="mri-total-val">${fmtPesos(total)}</div>
          <div class="mri-ordenes">1 orden abierta</div>
        </div>
      </div>`;
    }).join('');
  }

  // Diario
  const totalDia  = ocupadas.reduce((s,m)=>s+calcSub(m.pedido)*1.16,0);
  const subDia    = ocupadas.reduce((s,m)=>s+calcSub(m.pedido),0);
  const ivaDia    = subDia*.16;
  const contDia   = document.getElementById('rep-diario-content');
  contDia.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-val">${ocupadas.length}</div><div class="kpi-label">Mesas activas</div></div>
      <div class="kpi-card"><div class="kpi-val">${ocupadas.length}</div><div class="kpi-label">Órdenes</div></div>
      <div class="kpi-card"><div class="kpi-val full">${fmtPesos(subDia)}</div><div class="kpi-label">Subtotal</div></div>
      <div class="kpi-card"><div class="kpi-val full">${fmtPesos(ivaDia)}</div><div class="kpi-label">IVA</div></div>
    </div>
    <div class="kpi-card" style="text-align:center;margin-bottom:.6rem">
      <div class="kpi-val" style="font-size:2rem">${fmtPesos(totalDia)}</div>
      <div class="kpi-label">Total del turno</div>
    </div>
    <div style="font-size:.62rem;color:var(--muted);text-align:center;margin-top:.5rem">
      ⚠ Datos del turno en memoria — conecta Sheets para historial completo
    </div>`;
}

// Reportes desde Sheets (cuando el Apps Script soporta get_reportes)
function renderReportesSheets(data) {
  renderReportesLocal(); // fallback hasta que se implemente el endpoint
}

// ══════════════════════════════════════════════════
// SCREEN 4: CONFIG
// ══════════════════════════════════════════════════
function initConfig() {
  document.getElementById('scriptUrlInput').value = SCRIPT_URL;
  actualizarMenuStatus(SCRIPT_URL ? 'URL configurada' : 'Sin URL — usando menú local');
}

// ══════════════════════════════════════════════════
// MODAL CUENTA
// ══════════════════════════════════════════════════
function abrirCuenta() {
  const m=mesas[mesaActiva];
  if (Object.keys(m.pedido).length===0) return;
  m.estado='cuenta'; mesaCerrando=mesaActiva;
  const sub=calcSub(m.pedido), iva=sub*.16, total=sub+iva;
  document.getElementById('modalTitle').textContent=`Cuenta — Mesa ${mesaActiva}`;
  document.getElementById('modalItems').innerHTML=Object.values(m.pedido).map(item=>
    `<div class="modal-item-row"><span><span class="qty">${item.qty}×</span>${item.nombre}</span><span>${fmtPesos(item.precio*item.qty)}</span></div>`
  ).join('')+`<div class="modal-item-row" style="color:var(--muted);margin-top:.4rem"><span>IVA (16%)</span><span>${fmtPesos(iva)}</span></div>`;
  document.getElementById('modalTotal').innerHTML=`<span>TOTAL</span> ${fmtPesos(total)}`;
  document.getElementById('modalIva').textContent=`Subtotal: ${fmtPesos(sub)}`;
  document.getElementById('modalOverlay').classList.remove('hidden');
  renderMesas();
}

function cerrarModal() {
  if (mesaCerrando&&mesas[mesaCerrando].estado==='cuenta') mesas[mesaCerrando].estado='ocupada';
  document.getElementById('modalOverlay').classList.add('hidden');
  mesaCerrando=null; renderMesas();
}

// ══════════════════════════════════════════════════
// PAGO → SHEETS
// ══════════════════════════════════════════════════
async function confirmarPago() {
  if (!mesaCerrando) return;
  const m=mesas[mesaCerrando];
  const sub=calcSub(m.pedido), iva=sub*.16, total=sub+iva;
  const payload={accion:'cerrar_orden', mesa:mesaCerrando, pedido:Object.values(m.pedido), subtotal:parseFloat(sub.toFixed(2)), iva:parseFloat(iva.toFixed(2)), total:parseFloat(total.toFixed(2))};

  if (!SCRIPT_URL) { showToast('⚠ Sin URL — orden solo local',''); liberarMesa(); return; }

  const btn=document.getElementById('btnPagar');
  btn.disabled=true; btn.textContent='⏳ Guardando...';
  setSyncDot('syncing');

  try {
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    setSyncDot('ok');
    showToast('✓ Orden guardada en Sheets','success');
  } catch(err) {
    setSyncDot('error');
    showToast('⚠ Error al guardar — cerrada localmente','error');
  }
  liberarMesa();
}

function liberarMesa() {
  if (!mesaCerrando) return;
  const id=mesaCerrando;
  mesas[id]={id,estado:'libre',pedido:{},hora:null};
  document.getElementById('modalOverlay').classList.add('hidden');
  if (mesaActiva===id) mesaActiva=null;
  mesaCerrando=null; renderMesas(); goScreen('mesas');
}

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
renderMesas();
if (SCRIPT_URL) setSyncDot('ok');
</script>
